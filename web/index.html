<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stepper Holo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0f14;
        --line: #243545;
        --text: #e2ecf5;
        --accent: #3cc0ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Segoe UI, Tahoma, sans-serif;
        background: radial-gradient(circle at 20% 20%, #102030, var(--bg) 50%);
        color: var(--text);
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        padding: 28px 32px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(16, 24, 32, 0.92);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 22px;
        line-height: 1.5;
        opacity: 0.9;
        font-size: 0.95rem;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li {
        margin-bottom: 12px;
      }
      a {
        display: block;
        padding: 14px 18px;
        border-radius: 8px;
        background: var(--accent);
        color: #001420;
        text-decoration: none;
        font-weight: 600;
        text-align: center;
      }
      a.secondary {
        background: #2d3f4f;
        color: var(--text);
        font-weight: 500;
      }
      a:hover {
        filter: brightness(1.06);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Stepper Holo</h1>
      <p>Choose a page: controls on your PC, fullscreen display on the iPhone.</p>
      <ul>
        <li><a href="/controls">Controls (motor, pan, image upload)</a></li>
        <li><a class="secondary" href="/display">Display (fullscreen)</a></li>
      </ul>
    </div>
  </body>
</html>
