<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rubik Pi 3 Stepper Control</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0f14;
        --panel: #101820;
        --line: #243545;
        --text: #e2ecf5;
        --accent: #3cc0ff;
        --danger: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Segoe UI, Tahoma, sans-serif;
        background: radial-gradient(circle at 15% 15%, #102030, var(--bg) 55%);
        color: var(--text);
      }
      .layout {
        display: grid;
        grid-template-columns: 380px 1fr;
        min-height: 100vh;
      }
      .panel {
        padding: 20px;
        border-right: 1px solid var(--line);
        background: rgba(16, 24, 32, 0.85);
      }
      h1 {
        margin: 0 0 14px;
        font-size: 1.25rem;
      }
      .group { margin-bottom: 12px; }
      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        background: #0d141b;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .buttons {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }
      button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: #2d3f4f;
        color: var(--text);
        cursor: pointer;
      }
      button.primary { background: var(--accent); color: #001420; font-weight: 600; }
      button.danger { background: var(--danger); color: #290404; font-weight: 600; }
      #status {
        margin-top: 16px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0d141b;
        white-space: pre-wrap;
        font-size: 0.85rem;
      }
      #three-container {
        width: 100%;
        height: 100vh;
      }
      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto 55vh;
        }
        .panel { border-right: none; border-bottom: 1px solid var(--line); }
        #three-container { height: 55vh; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <section class="panel">
        <h1>Stepper + Three.js Control</h1>

        <div class="group">
          <label for="speed">Speed (rev/s, negative = reverse)</label>
          <input id="speed" type="number" step="0.1" value="1.0" />
        </div>
        <div class="group">
          <label for="duration">Duration (seconds)</label>
          <input id="duration" type="number" step="0.1" value="3.0" />
        </div>
        <div class="group">
          <label for="ramp">Ramp (seconds)</label>
          <input id="ramp" type="number" step="0.1" value="0.5" />
        </div>
        <div class="group">
          <label for="microsteps">Microsteps</label>
          <input id="microsteps" type="number" step="1" value="16" />
        </div>

        <div class="buttons">
          <button id="runBtn" class="primary">Run</button>
          <button id="stopBtn" class="danger">Stop</button>
          <button id="refreshBtn">Refresh Status</button>
        </div>

        <div id="status">Loading status...</div>
      </section>

      <div id="three-container"></div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
